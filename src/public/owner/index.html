<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#D85A30" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>wrenlo Dashboard</title>
  <link rel="icon" href="/wrenlo-icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/owner/styles.css" />
</head>
<body>
<div id="app">

  <!-- ═══════════════════════════════════════════
       LIST VIEW
  ═══════════════════════════════════════════ -->
  <div class="view" id="view-list">

    <header class="app-header">
      <div class="header-brand">
        <div class="business-avatar" id="header-avatar">?</div>
        <div class="header-title-group">
          <h1 class="header-business-name" id="header-business-name">Loading…</h1>
          <span class="header-subtitle"><img src="/wrenlo-icon.svg" class="wrenlo-nav-icon" alt="" aria-hidden="true" /> wrenlo</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="refresh-btn" aria-label="Refresh" title="Refresh">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
        </button>
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">🌙</button>
      </div>
    </header>

    <div class="stats-bar" id="stats-bar" role="region" aria-label="Quick stats">
      <div class="stat">
        <span class="stat-value" id="stat-active">—</span>
        <span class="stat-label">Active</span>
      </div>
      <div class="stat stat--hot">
        <span class="stat-value" id="stat-hot">—</span>
        <span class="stat-label">Hot Leads</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-today">—</span>
        <span class="stat-label">Today</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-total">—</span>
        <span class="stat-label">Total</span>
      </div>
    </div>

    <div class="lead-alert hidden" id="lead-alert" role="alert">
      <div class="alert-content">
        <span class="alert-flame" aria-hidden="true">🔥</span>
        <div class="alert-text">
          <strong id="alert-title">Hot leads need attention</strong>
        </div>
        <button class="alert-cta" id="alert-scroll-btn">View</button>
      </div>
    </div>

    <div class="conv-list-container" id="conv-list-container">
      <div id="conv-list" role="list">
        <div class="loading-state" id="list-loading">
          <div class="spinner" aria-hidden="true"></div>
          <span>Loading conversations…</span>
        </div>
      </div>
    </div>

  </div><!-- /view-list -->


  <!-- ═══════════════════════════════════════════
       DETAIL VIEW
  ═══════════════════════════════════════════ -->
  <div class="view" id="view-detail">

    <header class="detail-header">
      <button class="icon-btn back-btn" id="back-btn" aria-label="Back to conversations">
        <svg width="10" height="17" viewBox="0 0 10 17" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 1 1 8.5 9 16"></polyline>
        </svg>
        <span class="back-label">Back</span>
      </button>
      <div class="detail-customer-info">
        <h2 class="detail-customer-name" id="detail-name">—</h2>
        <span class="detail-status-badge" id="detail-status"></span>
      </div>
      <div class="detail-meta-right">
        <span id="detail-score"></span>
      </div>
    </header>

    <div class="messages-area" id="messages-area" role="log" aria-live="polite" aria-label="Conversation messages">
      <div class="loading-state">
        <div class="spinner" aria-hidden="true"></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottom-bar">
      <!-- Shown when conversation is NOT claimed by owner -->
      <div id="claim-area">
        <button class="btn btn--claim" id="claim-btn">
          Take Over Conversation
        </button>
        <p class="claim-hint">The AI is currently handling this conversation</p>
      </div>

      <!-- Shown when conversation IS claimed (handed_off) -->
      <div id="compose-area" class="hidden">
        <div class="compose-row">
          <textarea
            id="compose-input"
            class="compose-input"
            placeholder="Message…"
            rows="1"
            aria-label="Message to customer"
          ></textarea>
          <button class="btn btn--send" id="send-btn" aria-label="Send message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
        <button class="btn btn--release" id="release-btn">Release to AI</button>
      </div>
    </div>

  </div><!-- /view-detail -->

</div><!-- /app -->

<script src="/owner/dashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wrenlo — AI receptionist for small businesses</title>
  <link rel="icon" href="/wrenlo-icon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#D85A30" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --brand: #D85A30;
      --brand-light: #e8724d;
      --bg: #fafaf9;
      --text: #1a1a1a;
      --text-secondary: #6b6b6b;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --text: #e8e8e6;
        --text-secondary: #9a9a98;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .logo {
      width: 72px;
      height: 72px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1.125rem;
      color: var(--text-secondary);
      max-width: 32ch;
      line-height: 1.5;
      margin-bottom: 2rem;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--brand);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }

    .cta:hover { background: var(--brand-light); }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      color: var(--text-secondary);
      font-size: 0.8125rem;
    }
  </style>
</head>
<body>
  <img src="/wrenlo-icon.svg" class="logo" alt="wrenlo" />
  <h1>wrenlo</h1>
  <p class="tagline">An AI receptionist that knows your business, handles customers, and sends you the leads that matter.</p>
  <a class="cta" href="#">Get started</a>
  <p class="footer">Coming soon</p>
</body>
</html>
